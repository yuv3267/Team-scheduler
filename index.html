<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>מערכת שיבוץ צוות</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Rubik:wght@300;400;500;600;700&display=swap');
  :root{--bg:#0f1117;--surface:#1a1d27;--surface2:#222535;--border:#2e3248;--accent:#4f8ef7;--accent2:#7c5cbf;--green:#2ecc71;--yellow:#f39c12;--red:#e74c3c;--text:#e8eaf0;--muted:#7880a0;--radius:12px}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Rubik',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
  header{background:var(--surface);border-bottom:1px solid var(--border);padding:14px 20px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
  .logo{width:36px;height:36px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
  header h1{font-size:17px;font-weight:600}
  header span{font-size:12px;color:var(--muted)}
  .header-right{margin-right:auto;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
  .week-badge{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:5px 12px;font-size:12px;color:var(--muted)}
  .sync-pill{display:flex;align-items:center;gap:6px;font-size:12px;padding:5px 12px;border-radius:8px;border:1px solid var(--border);background:var(--surface2);color:var(--muted)}
  .sync-dot{width:7px;height:7px;border-radius:50%;background:var(--muted);flex-shrink:0}
  .sync-dot.syncing{background:var(--yellow);animation:pulse .8s infinite}
  .sync-dot.ok{background:var(--green)}
  .sync-dot.err{background:var(--red)}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.25}}
  nav{display:flex;gap:4px;padding:10px 20px;background:var(--surface);border-bottom:1px solid var(--border);overflow-x:auto}
  .tab{padding:7px 16px;border-radius:8px;border:none;background:transparent;color:var(--muted);font-family:'Rubik',sans-serif;font-size:13px;cursor:pointer;white-space:nowrap;transition:all .15s}
  .tab:hover{background:var(--surface2);color:var(--text)}
  .tab.active{background:var(--accent);color:#fff;font-weight:500}
  main{padding:20px;max-width:1100px;margin:0 auto}
  .panel{display:none}.panel.active{display:block}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px;margin-bottom:18px}
  .card-title{font-size:12px;font-weight:600;color:var(--muted);letter-spacing:.06em;text-transform:uppercase;margin-bottom:14px}
  label{font-size:13px;color:var(--muted);display:block;margin-bottom:5px}
  input[type=text]{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'Rubik',sans-serif;font-size:14px;padding:8px 11px;outline:none;transition:border-color .15s}
  input:focus{border-color:var(--accent)}
  .btn{background:var(--accent);color:#fff;border:none;border-radius:8px;padding:9px 20px;font-family:'Rubik',sans-serif;font-size:13px;font-weight:500;cursor:pointer;transition:opacity .15s;white-space:nowrap}
  .btn:hover{opacity:.85}
  .btn:disabled{opacity:.45;cursor:not-allowed}
  .btn.secondary{background:var(--surface2);color:var(--text);border:1px solid var(--border)}
  .wizard-step{display:none}.wizard-step.active{display:block}
  .step-header{display:flex;align-items:center;gap:12px;margin-bottom:18px}
  .step-num{width:30px;height:30px;background:var(--accent);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0}
  .step-title{font-size:15px;font-weight:600}
  .step-sub{font-size:12px;color:var(--muted)}
  .day-row{display:grid;grid-template-columns:90px 1fr;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--border)}
  .day-row:last-child{border-bottom:none}
  .day-label{font-size:13px;font-weight:500}
  .status-btns{display:flex;gap:6px;flex-wrap:wrap}
  .status-btn{padding:5px 11px;border-radius:6px;border:1px solid var(--border);background:var(--surface2);color:var(--muted);font-family:'Rubik',sans-serif;font-size:12px;cursor:pointer;transition:all .12s}
  .status-btn:hover{border-color:var(--accent);color:var(--text)}
  .status-btn.sel-present{background:#1a3d28;border-color:var(--green);color:var(--green)}
  .status-btn.sel-away{background:#3d2020;border-color:var(--red);color:var(--red)}
  .status-btn.sel-after{background:#3d2e10;border-color:var(--yellow);color:var(--yellow)}
  .status-btn.sel-line{background:#2c1a4a;border-color:var(--accent2);color:var(--accent2)}
  .data-table{width:100%;border-collapse:collapse;font-size:12px}
  .data-table th{background:var(--surface2);color:var(--muted);font-weight:600;font-size:11px;letter-spacing:.04em;padding:9px 12px;text-align:center;border:1px solid var(--border)}
  .data-table td{padding:9px 12px;border:1px solid var(--border);text-align:center}
  .data-table tr:hover td{background:var(--surface2)}
  .badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:500}
  .badge-present{background:#1a3d28;color:var(--green)}
  .badge-away{background:#3d2020;color:var(--red)}
  .badge-after{background:#3d2e10;color:var(--yellow)}
  .badge-line{background:#2c1a4a;color:var(--accent2)}
  .badge-empty{color:var(--muted)}
  .duty-grid{display:grid;gap:10px}
  .duty-day-card{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:14px}
  .duty-day-header{font-size:14px;font-weight:600;margin-bottom:10px;padding-bottom:9px;border-bottom:1px solid var(--border);color:var(--accent);display:flex;align-items:center;flex-wrap:wrap;gap:8px}
  .duty-roles{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
  .mission-tag{font-size:11px;font-weight:400;background:var(--surface);border:1px solid var(--border);border-radius:5px;padding:2px 8px;color:var(--muted)}
  .summary-bar{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:18px}
  .stat-box{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 18px;min-width:120px}
  .stat-val{font-size:24px;font-weight:700;color:var(--accent);line-height:1}
  .stat-lbl{font-size:11px;color:var(--muted);margin-top:3px}
  .person-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:8px;margin-bottom:14px}
  .person-chip{padding:9px;border-radius:8px;border:1px solid var(--border);background:var(--surface2);color:var(--muted);font-size:13px;cursor:pointer;text-align:center;transition:all .12s}
  .person-chip.sel{border-color:var(--accent);background:rgba(79,142,247,.15);color:var(--text);font-weight:500}
  .actions{display:flex;gap:8px;margin-top:14px;flex-wrap:wrap}
  .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--green);color:#fff;padding:11px 22px;border-radius:10px;font-size:13px;font-weight:500;transition:transform .3s;z-index:99;white-space:nowrap}
  .toast.show{transform:translateX(-50%) translateY(0)}
  .overlay{position:fixed;inset:0;background:rgba(15,17,23,.9);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;z-index:200;font-size:14px;color:var(--muted)}
  .spinner{width:34px;height:34px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  @media(max-width:560px){.duty-roles{grid-template-columns:1fr 1fr}}
</style>
</head>
<body>

<div class="overlay" id="loadingOverlay">
  <div class="spinner"></div>
  <span id="loadingMsg">מתחבר ל-Firebase...</span>
</div>

<header>
  <div class="logo">🛡</div>
  <div>
    <h1>מערכת שיבוץ צוות</h1>
    <span>כוננות · חובש תורן · נוכחות</span>
  </div>
  <div class="header-right">
    <div class="week-badge" id="weekBadge">—</div>
    <div class="sync-pill">
      <div class="sync-dot" id="syncDot"></div>
      <span id="syncLabel">מתחבר...</span>
    </div>
  </div>
</header>

<nav>
  <button class="tab active" onclick="switchTab('attendance',this)">📋 לו"ז נוכחות</button>
  <button class="tab" onclick="switchTab('duty',this)">🔰 כוננות</button>
  <button class="tab" onclick="switchTab('medic',this)">🩺 חובש תורן</button>
  <button class="tab" onclick="switchTab('view',this)">👁 הכל</button>
</nav>

<main>
  <div class="panel active" id="panel-attendance">
    <div class="card">
      <div class="card-title">עדכון לו"ז נוכחות</div>
      <div class="wizard-step active" id="att-step1">
        <div class="step-header">
          <div class="step-num">1</div>
          <div><div class="step-title">בחר/י איש צוות</div></div>
        </div>
        <div class="person-grid" id="personGrid"></div>
        <div class="actions"><button class="btn" onclick="startWizard()">המשך ←</button></div>
      </div>
      <div class="wizard-step" id="att-step2">
        <div class="step-header">
          <div class="step-num">2</div>
          <div><div class="step-title">סטטוס לכל יום</div><div class="step-sub" id="wizardPersonLabel">—</div></div>
        </div>
        <div id="dayRows"></div>
        <div class="actions">
          <button class="btn secondary" onclick="goBackWizard()">← חזור</button>
          <button class="btn" id="saveAttBtn" onclick="saveAttendance()">💾 שמור</button>
        </div>
      </div>
    </div>
    <div class="card">
      <div class="card-title">טבלת נוכחות</div>
      <div style="overflow-x:auto"><table class="data-table"><thead><tr id="attHead"></tr></thead><tbody id="attBody"></tbody></table></div>
    </div>
  </div>

  <div class="panel" id="panel-duty">
    <div class="card">
      <div class="card-title">שיבוץ צוות כוננות</div>
      <div class="duty-grid" id="dutyGrid"></div>
      <div class="actions"><button class="btn" id="saveDutyBtn" onclick="saveDuty()">💾 שמור</button></div>
    </div>
    <div class="card">
      <div class="card-title">סיכום כוננות</div>
      <div style="overflow-x:auto"><table class="data-table"><thead><tr id="dutyHead"></tr></thead><tbody id="dutyBody"></tbody></table></div>
    </div>
  </div>

  <div class="panel" id="panel-medic">
    <div class="card">
      <div class="card-title">שיבוץ חובש תורן</div>
      <div class="duty-grid" id="medicGrid"></div>
      <div class="actions"><button class="btn" id="saveMedicBtn" onclick="saveMedic()">💾 שמור</button></div>
    </div>
    <div class="card">
      <div class="card-title">חובש תורן השבוע</div>
      <div style="overflow-x:auto"><table class="data-table"><thead><tr id="medicHead"></tr></thead><tbody id="medicBody"></tbody></table></div>
    </div>
  </div>

  <div class="panel" id="panel-view">
    <div class="summary-bar" id="summaryBar"></div>
    <div class="card">
      <div class="card-title">נוכחות</div>
      <div style="overflow-x:auto"><table class="data-table"><thead><tr id="vAttHead"></tr></thead><tbody id="vAttBody"></tbody></table></div>
    </div>
    <div class="card">
      <div class="card-title">כוננות</div>
      <div style="overflow-x:auto"><table class="data-table"><thead><tr id="vDutyHead"></tr></thead><tbody id="vDutyBody"></tbody></table></div>
    </div>
    <div class="card">
      <div class="card-title">חובש תורן</div>
      <div style="overflow-x:auto"><table class="data-table"><thead><tr id="vMedicHead"></tr></thead><tbody id="vMedicBody"></tbody></table></div>
    </div>
  </div>
</main>

<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, onValue, set, get } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyBxWRTBuJ-bvZtriLEP5qfJiIXRej778Nw",
  authDomain: "g-team-73edb.firebaseapp.com",
  databaseURL: "https://g-team-73edb-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "g-team-73edb",
  storageBucket: "g-team-73edb.firebasestorage.app",
  messagingSenderId: "20822712018",
  appId: "1:20822712018:web:8f7e54fa61f85da07b570b"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const DAYS = ['ראשון','שני','שלישי','רביעי','חמישי','שישי','שבת'];
const WORK_DAYS = ['ראשון','שני','שלישי','רביעי','חמישי'];
const MEMBERS = ['שני','יובל','ספיר','אלה','אייבי','ישראל','שגיא','אדר','אגם'];
const ROLES = ['חובש','מנא','מטב'];
const MISSIONS = {ראשון:'מעצר בחרבתא',שני:'פטרול רגלי דיר קדיס',שלישי:'שליפה לתחקור + חיפוק פטרול',רביעי:'שליפה לתחקור דיר אבו משאל',חמישי:'פטרול רכוב שוקבא, דיר קדיס, נעלין, קיביא'};
const STATUS_OPTS = [{key:'present',label:'נוכח/ת',cls:'sel-present'},{key:'away',label:'לא נוכח/ת',cls:'sel-away'},{key:'after',label:'אחרי תורנות',cls:'sel-after'},{key:'line',label:'סבב קו',cls:'sel-line'},{key:'leave',label:'חופש',cls:'sel-away'}];

const DEFAULTS = {
  attendance: {
    'שני':{ראשון:'present',שני:'present',שלישי:'present',רביעי:'present',חמישי:'present',שישי:'after',שבת:'after'},
    'יובל':{ראשון:'',שני:'present',שלישי:'present',רביעי:'present',חמישי:'present',שישי:'after',שבת:'after'},
    'ספיר':{ראשון:'',שני:'',שלישי:'',רביעי:'',חמישי:'',שישי:'',שבת:''},
    'אלה':{ראשון:'present',שני:'away',שלישי:'present',רביעי:'away',חמישי:'away',שישי:'line',שבת:'line'},
    'אייבי':{ראשון:'present',שני:'present',שלישי:'present',רביעי:'present',חמישי:'present',שישי:'present',שבת:'present'},
    'ישראל':{ראשון:'present',שני:'present',שלישי:'present',רביעי:'present',חמישי:'present',שישי:'present',שבת:'present'},
    'שגיא':{ראשון:'present',שני:'present',שלישי:'present',רביעי:'present',חמישי:'present',שישי:'present',שבת:'present'},
    'אדר':{ראשון:'',שני:'',שלישי:'',רביעי:'',חמישי:'',שישי:'',שבת:''},
    'אגם':{ראשון:'away',שני:'away',שלישי:'away',רביעי:'away',חמישי:'away',שישי:'away',שבת:'away'},
  },
  duty: {
    ראשון:{חובש:'ישראל',מנא:'אייבי',מטב:'דוק'},שני:{חובש:'אייבי',מנא:'יובל',מטב:'דוק'},
    שלישי:{חובש:'מאיה',מנא:'שני',מטב:'דוק'},רביעי:{חובש:'שגיא',מנא:'אייבי',מטב:'דוק'},
    חמישי:{חובש:'שגיא',מנא:'אייבי',מטב:'דוק'},
  },
  medic: {ראשון:'יובל',שני:'שגיא',שלישי:'אדר',רביעי:'מאיה',חמישי:'אדר',שישי:'ישראל',שבת:'שגיא'}
};

let attendance = {}, duty = {}, medic = {}, selectedPerson = null, daySel = {};

// ── Firebase realtime listeners ──
function setupListeners() {
  onValue(ref(db, 'attendance'), snap => {
    attendance = snap.val() || DEFAULTS.attendance;
    renderAttTable(); if(document.getElementById('panel-view').classList.contains('active')) renderViewAll();
  });
  onValue(ref(db, 'duty'), snap => {
    duty = snap.val() || DEFAULTS.duty;
    renderDutyTable(); buildDutyGrid();
    if(document.getElementById('panel-view').classList.contains('active')) renderViewAll();
  });
  onValue(ref(db, 'medic'), snap => {
    medic = snap.val() || DEFAULTS.medic;
    renderMedicTable(); buildMedicGrid();
    if(document.getElementById('panel-view').classList.contains('active')) renderViewAll();
  });
}

async function initData() {
  try {
    const snap = await get(ref(db, 'attendance'));
    if (!snap.exists()) {
      await set(ref(db, 'attendance'), DEFAULTS.attendance);
      await set(ref(db, 'duty'), DEFAULTS.duty);
      await set(ref(db, 'medic'), DEFAULTS.medic);
    }
    setupListeners();
    setSyncState('ok','מחובר');
  } catch(e) {
    console.error(e);
    setSyncState('err','שגיאת חיבור');
    attendance = DEFAULTS.attendance; duty = DEFAULTS.duty; medic = DEFAULTS.medic;
  }
  document.getElementById('loadingOverlay').style.display = 'none';
  buildAll();
}

// ── Save functions ──
async function fbSet(path, data) {
  setSyncState('syncing','שומר...');
  try {
    await set(ref(db, path), data);
    setSyncState('ok','נשמר ✓');
    return true;
  } catch(e) {
    setSyncState('err','שגיאה');
    showToast('שגיאת שמירה','#e74c3c');
    return false;
  }
}

// ── UI helpers ──
function setSyncState(s,l){document.getElementById('syncDot').className='sync-dot '+s;document.getElementById('syncLabel').textContent=l;}
function showToast(msg,color){const t=document.getElementById('toast');t.textContent=msg;t.style.background=color||'var(--green)';t.classList.add('show');setTimeout(()=>t.classList.remove('show'),3000);}
function setWeekBadge(){const now=new Date();const sun=new Date(now);sun.setDate(now.getDate()-now.getDay());const sat=new Date(sun);sat.setDate(sun.getDate()+6);const fmt=d=>`${d.getDate()}/${d.getMonth()+1}`;document.getElementById('weekBadge').textContent=`${fmt(sun)}–${fmt(sat)}`;}
function setBtnLoading(id,loading){const btn=document.getElementById(id);if(!btn)return;btn.disabled=loading;btn.textContent=loading?'⏳ שומר...':'💾 שמור';}

window.switchTab = function(name,el){document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));el.classList.add('active');document.getElementById('panel-'+name).classList.add('active');if(name==='view')renderViewAll();}

// ── Attendance ──
function buildPersonGrid(){document.getElementById('personGrid').innerHTML=MEMBERS.map(m=>`<div class="person-chip ${selectedPerson===m?'sel':''}" onclick="selectPerson('${m}')">${m}</div>`).join('');}
window.selectPerson = function(name){selectedPerson=name;buildPersonGrid();}
window.startWizard = function(){if(!selectedPerson){showToast('בחר/י איש צוות','#e74c3c');return;}daySel={...(attendance[selectedPerson]||{})};document.getElementById('wizardPersonLabel').textContent=selectedPerson;document.getElementById('dayRows').innerHTML=DAYS.map(day=>`<div class="day-row"><div class="day-label">${day}</div><div class="status-btns">${STATUS_OPTS.map(o=>`<button class="status-btn ${daySel[day]===o.key?o.cls:''}" onclick="setDay('${day}','${o.key}','${o.cls}',this)">${o.label}</button>`).join('')}</div></div>`).join('');document.getElementById('att-step1').classList.remove('active');document.getElementById('att-step2').classList.add('active');}
window.setDay = function(day,key,cls,btn){daySel[day]=key;btn.closest('.day-row').querySelectorAll('.status-btn').forEach(b=>b.className='status-btn');btn.classList.add(cls);}
window.saveAttendance = async function(){attendance[selectedPerson]={...daySel};renderAttTable();goBackWizard();setBtnLoading('saveAttBtn',true);const ok=await fbSet('attendance',attendance);setBtnLoading('saveAttBtn',false);if(ok)showToast(`✓ לו"ז ${selectedPerson} נשמר`);}
window.goBackWizard = function(){document.getElementById('att-step2').classList.remove('active');document.getElementById('att-step1').classList.add('active');}
function renderAttTable(){document.getElementById('attHead').innerHTML=`<th>שם</th>`+DAYS.map(d=>`<th>${d}</th>`).join('');document.getElementById('attBody').innerHTML=MEMBERS.map(m=>{const row=attendance[m]||{};return`<tr><td style="font-weight:600;text-align:right">${m}</td>${DAYS.map(d=>`<td>${badge(row[d])}</td>`).join('')}</tr>`;}).join('');}
function badge(k){const m={present:'<span class="badge badge-present">נוכח</span>',away:'<span class="badge badge-away">לא נוכח</span>',after:'<span class="badge badge-after">אחרי תורנות</span>',line:'<span class="badge badge-line">סבב קו</span>',leave:'<span class="badge badge-away">חופש</span>'};return m[k]||'<span class="badge-empty">—</span>';}

// ── Duty ──
function buildDutyGrid(){document.getElementById('dutyGrid').innerHTML=WORK_DAYS.map(day=>`<div class="duty-day-card"><div class="duty-day-header">${day}${MISSIONS[day]?`<span class="mission-tag">${MISSIONS[day]}</span>`:''}</div><div class="duty-roles">${ROLES.map(r=>`<div><label>${r}</label><input type="text" id="duty-${day}-${r}" value="${(duty[day]||{})[r]||''}" placeholder="שם"></div>`).join('')}</div></div>`).join('');}
window.saveDuty = async function(){WORK_DAYS.forEach(day=>{duty[day]={};ROLES.forEach(r=>{duty[day][r]=document.getElementById(`duty-${day}-${r}`).value;});});renderDutyTable();setBtnLoading('saveDutyBtn',true);const ok=await fbSet('duty',duty);setBtnLoading('saveDutyBtn',false);if(ok)showToast('✓ שיבוץ כוננות נשמר');}
function renderDutyTable(){document.getElementById('dutyHead').innerHTML=`<th>יום</th><th>משימה</th>`+ROLES.map(r=>`<th>${r}</th>`).join('');document.getElementById('dutyBody').innerHTML=WORK_DAYS.map(day=>`<tr><td style="font-weight:600">${day}</td><td style="font-size:11px;color:var(--muted)">${MISSIONS[day]||'—'}</td>${ROLES.map(r=>`<td>${(duty[day]||{})[r]||'—'}</td>`).join('')}</tr>`).join('');}

// ── Medic ──
function buildMedicGrid(){document.getElementById('medicGrid').innerHTML=DAYS.map(day=>`<div class="duty-day-card"><div class="duty-day-header">${day}</div><div style="max-width:220px"><label>חובש/ת תורן/ת</label><input type="text" id="medic-${day}" value="${medic[day]||''}" placeholder="שם"></div></div>`).join('');}
window.saveMedic = async function(){DAYS.forEach(d=>{medic[d]=document.getElementById(`medic-${d}`).value;});renderMedicTable();setBtnLoading('saveMedicBtn',true);const ok=await fbSet('medic',medic);setBtnLoading('saveMedicBtn',false);if(ok)showToast('✓ חובש תורן נשמר');}
function renderMedicTable(){document.getElementById('medicHead').innerHTML=DAYS.map(d=>`<th>${d}</th>`).join('');document.getElementById('medicBody').innerHTML=`<tr>${DAYS.map(d=>`<td style="font-weight:600">${medic[d]||'—'}</td>`).join('')}</tr>`;}

// ── View All ──
function renderViewAll(){
  const total=Object.values(attendance).reduce((s,r)=>s+Object.values(r).filter(v=>v==='present').length,0);
  document.getElementById('summaryBar').innerHTML=`<div class="stat-box"><div class="stat-val">${MEMBERS.length}</div><div class="stat-lbl">חברי צוות</div></div><div class="stat-box"><div class="stat-val">${total}</div><div class="stat-lbl">ימי נוכחות</div></div><div class="stat-box"><div class="stat-val">${WORK_DAYS.filter(d=>(duty[d]||{}).חובש).length}/5</div><div class="stat-lbl">כוננות</div></div><div class="stat-box"><div class="stat-val">${DAYS.filter(d=>medic[d]).length}/7</div><div class="stat-lbl">חובש תורן</div></div>`;
  document.getElementById('vAttHead').innerHTML=`<th>שם</th>`+DAYS.map(d=>`<th>${d}</th>`).join('');
  document.getElementById('vAttBody').innerHTML=MEMBERS.map(m=>{const row=attendance[m]||{};return`<tr><td style="font-weight:600;text-align:right">${m}</td>${DAYS.map(d=>`<td>${badge(row[d])}</td>`).join('')}</tr>`;}).join('');
  document.getElementById('vDutyHead').innerHTML=`<th>יום</th>`+ROLES.map(r=>`<th>${r}</th>`).join('');
  document.getElementById('vDutyBody').innerHTML=WORK_DAYS.map(d=>`<tr><td style="font-weight:600">${d}</td>${ROLES.map(r=>`<td>${(duty[d]||{})[r]||'—'}</td>`).join('')}</tr>`).join('');
  document.getElementById('vMedicHead').innerHTML=DAYS.map(d=>`<th>${d}</th>`).join('');
  document.getElementById('vMedicBody').innerHTML=`<tr>${DAYS.map(d=>`<td style="font-weight:600">${medic[d]||'—'}</td>`).join('')}</tr>`;
}

function buildAll(){buildPersonGrid();buildDutyGrid();buildMedicGrid();renderAttTable();renderDutyTable();renderMedicTable();}

setWeekBadge();
initData();
</script>
</body>
</html>
